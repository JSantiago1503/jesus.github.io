<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedicatoria Musical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-600 to-indigo-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden transform transition-all p-6 md:p-8">
        
        <div class="text-center mb-6">
            <div class="inline-block bg-purple-100 p-3 rounded-full text-purple-600 mb-3">
                <i class="fa-solid fa-music text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Dedica una Canci&oacute;n</h1>
            <p class="text-sm text-gray-500 mt-1">Llena los datos para enviar tu dedicatoria por WhatsApp</p>
        </div>

        <form id="formDedicatoria" class="space-y-5">
            
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fa-solid fa-user text-purple-500 mr-1"></i> Tu Nombre o para qui&eacute;n es:
                </label>
                <input type="text" id="nombre" required placeholder="Ej. Para: Sof&iacute;a / De: Carlos"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all">
            </div>

            <div>
                <label for="cancion" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fa-solid fa-radio text-purple-500 mr-1"></i> Canci&oacute;n y Artista:
                </label>
                <input type="text" id="cancion" required placeholder="Ej. Perfect - Ed Sheeran"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all">
            </div>

            <div>
                <label for="dedicatoria" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fa-solid fa-heart text-purple-500 mr-1"></i> Tu Dedicatoria:
                </label>
                <textarea id="dedicatoria" rows="4" required placeholder="Escribe aqu&iacute; tu mensaje especial..."
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all resize-none"></textarea>
            </div>

            <button type="submit" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2 mt-2 cursor-pointer text-base">
                <i class="fa-brands fa-whatsapp text-xl"></i>
                Enviar por WhatsApp
            </button>
            
        </form>
    </div>

    <script>
        document.getElementById('formDedicatoria').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue

            // 1. Reemplaza este número por el tuyo (con código de país, sin el signo +)
            // Ejemplo: 521234567890 (México), 34123456789 (Espańa), 57123456789 (Colombia)
            // Si lo dejas vacío, abrirá WhatsApp para que elijas a qué contacto enviárselo.
            const numeroTelefono = "525665067247"; 

            // 2. Obtener los valores del formulario
            const nombre = document.getElementById('nombre').value.trim();
            const cancion = document.getElementById('cancion').value.trim();
            const dedicatoria = document.getElementById('dedicatoria').value.trim();

            // 3. Estructurar el mensaje con formato de WhatsApp (* para negritas)
            const mensajeOriginal = 
`*DEDICATORIA MUSICAL*

Nombre: ${nombre}
Cancion: ${cancion}

Mensaje:
"${dedicatoria}"`;

            // 4. Codificar el texto para que sea válido en una URL
            const mensajeCodificado = encodeURIComponent(mensajeOriginal);

            // 5. Construir la URL de la API de WhatsApp
            let urlWhatsapp = `https://wa.me/${numeroTelefono}?text=${mensajeCodificado}`;

            // 6. Redirigir al usuario (abrirá la app de WhatsApp o WhatsApp Web automáticamente)
            window.open(urlWhatsapp, '_blank');
        });
    </script>
</body>
</html>
